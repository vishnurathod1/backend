<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'log_reg.css' %}">
    <style>

    label[ for=email],
    label[ for=confirm],
    label[for=fullname],
    label[ for=admin],
    label[ for=password],
    label[ for=teacher],
    label[ for=student],
    label[ for=fullName],
    label[ for=phone]

    {
        color: black;
    }
    .login-link a,
    .register-link a{
        color:blank;

    }
    .submit-btn{
        color: black;
    }
    label{
        font-weight: bold;
        color: black;
    }
    h1{
        color: black;
    }
    </style>
</head>
<body>
    <div class="container">
        <div class="image-container">
            <img src="https://img.icons8.com/ios-filled/50/000000/graduation-cap.png" alt="Graduation Cap" class="edu-icon">
            <img src="https://img.icons8.com/ios-filled/50/000000/book.png" alt="Book" class="edu-icon">
            <img src="https://img.icons8.com/ios-filled/50/000000/light-on.png" alt="Lightbulb" class="edu-icon">
        </div>
        <h1>User Registration</h1>
        <form id="registrationForm" action="{% url 'registration' %}" method="post">
{% csrf_token %}
            <div class="form-group">
                <label for="fullName">Full Name:</label>
                <input type="text" id="fullName" name="fullName" required>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password:</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone number</label>
                <input type="text" id="phone" name="phone" required>
            </div>

            <div class="form-group">
                <label>User Type:</label>
                <div class="radio-group">
                    <input type="radio" id="admin" name="userType" value="admin" required>
                    <label for="admin">Admin</label>

                    <input type="radio" id="teacher" name="userType" value="trainer">
                    <label for="teacher">Trainer</label>

                    <input type="radio" id="student" name="userType" value="trainee">
                    <label for="student">Student</label>
                </div>
            </div>

            <div class="form-group" id="subjectGroup" style="display: none;">
                <label for="subject">Subject:</label>
                <select id="subject" name="subject">
                    <option value="">Select Subject</option>
                    <option value="js">JavaScript</option>
                    <option value="css">CSS</option>
                    <option value="html">HTML</option>
                    <option value="python">Python</option>
                    <option value="java">Java</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <button type="submit" class="submit-btn">Register</button>
            <p class="login-link">Already have an account? <a href="{% url 'login' %}">Login here</a></p>
        </form>
    </div>

    <script>
        // Show/hide subject field based on user type
        document.querySelectorAll('input[name="userType"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                const subjectGroup = document.getElementById('subjectGroup');
                if (e.target.value === 'trainer') {
                    subjectGroup.style.display = 'block';
                } else {
                    subjectGroup.style.display = 'none';
                }
            });
        });
    </script>

</body>
</html>
